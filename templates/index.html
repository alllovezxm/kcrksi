
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生管理系统</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>学生管理系统</h1>
        <a href="{{ url_for('add') }}" class="btn btn-primary">添加学生</a>
        
        <table>
            <thead>
                <tr>
                    <th>姓名</th>
                    <th>学号</th>
                    <th>班级</th>
                    <th>电话</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody>
                {% for student in students %}
                <tr>
                    <td>{{ student.name }}</td>
                    <td>{{ student.student_id }}</td>
                    <td>{{ student.class_name }}</td>
                    <td>{{ student.phone }}</td>
                    <td>
                        <a href="{{ url_for('edit', id=student.id) }}" class="btn btn-warning">编辑</a>
                        <a href="{{ url_for('delete', id=student.id) }}" class="btn btn-danger" onclick="return confirm('确定删除吗？')">删除</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
